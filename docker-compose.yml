services:
  pcloud-sync-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pcloud-sync-app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_SECRET_KEY: change-me
      DATABASE_URL: sqlite:////app/backend/data/app.db
      DEFAULT_TIMEZONE: Europe/Berlin
      FILE_BROWSER_ROOTS: /app/backend/data,/app/data/config,/mnt/nas
      RCLONE_CONFIG: /app/data/config/rclone/rclone.conf
      RCLONE_GLOBAL_FLAGS: --use-json-log --log-level INFO --stats 10s --stats-one-line-json
      TELEGRAM_ENABLED: "false"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      TELEGRAM_NOTIFY_ON_SUCCESS: "false"
      TELEGRAM_NOTIFY_ON_ERROR: "true"
    volumes:
      - ./backend/data:/app/backend/data
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      # Beispiel fuer einen echten Host- oder NAS-Mount:
      # - /mnt/nas:/mnt/nas
    restart: unless-stopped
